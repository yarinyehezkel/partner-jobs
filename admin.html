<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><meta name="robots" content="noindex,nofollow" /><title>ניהול משרות | Partner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>body{margin:0;font-family:Assistant,Arial,sans-serif;background:#f3fffd;color:#061212}.wrap{width:min(1040px,calc(100% - 28px));margin:34px auto}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:22px}.logo{font-weight:900;font-size:34px;direction:ltr}.panel{background:#fff;border-radius:28px;padding:22px;box-shadow:0 16px 46px rgba(0,0,0,.09);margin-bottom:18px}h1{font-size:44px;margin:0;font-weight:900}.grid{display:grid;grid-template-columns:1fr 1fr 120px 140px;gap:12px;align-items:end}label{font-weight:900}input,select{width:100%;border:2px solid #d8eeee;border-radius:14px;padding:13px;font:800 17px Assistant}.btn{border:0;border-radius:999px;background:#ffe300;padding:13px 18px;font:900 17px Assistant;cursor:pointer}.btn.black{background:#071111;color:#fff}.btn.ghost{background:#eef9f8}.jobs{display:grid;gap:10px}.job{display:grid;grid-template-columns:1fr 1fr 100px 90px 90px;gap:10px;align-items:center;background:#f8fffe;border:1px solid #dff3f0;border-radius:18px;padding:12px}.muted{color:#607;font-weight:700}.hidden{display:none}.error{background:#fff1f1;color:#8a1111;border-radius:14px;padding:12px;font-weight:900;margin:12px 0}.success{background:#ecfff4;color:#086b35;border-radius:14px;padding:12px;font-weight:900;margin:12px 0}@media(max-width:760px){.top,.grid,.job{grid-template-columns:1fr}.job{gap:8px}h1{font-size:34px}}</style>
</head>
<body><div class="wrap"><div class="top"><div><div class="logo">Partner 5G</div><h1>ניהול משרות</h1></div><button class="btn ghost hidden" id="logoutBtn">התנתקות</button></div>
  <section class="panel" id="loginPanel"><h2>כניסה למערכת</h2><p class="muted">הכניסה מבוססת Supabase Auth. יש ליצור משתמש מורשה בפרויקט Supabase.</p><div class="grid" style="grid-template-columns:1fr 1fr 140px"><div><label>אימייל</label><input id="email" type="email" placeholder="admin@example.com"></div><div><label>סיסמה</label><input id="password" type="password" placeholder="••••••••"></div><button class="btn" id="loginBtn">כניסה</button></div><div id="loginMsg"></div></section>
  <section class="panel hidden" id="appPanel"><h2>הוספת משרה</h2><div class="grid"><div><label>שם משרה</label><input id="title" placeholder="שירות ומכירות"></div><div><label>מיקום</label><input id="location" placeholder="באר שבע"></div><div><label>סדר</label><input id="sort" type="number" value="10"></div><button class="btn" id="addBtn">הוספה</button></div><div id="appMsg"></div></section>
  <section class="panel hidden" id="listPanel"><h2>משרות קיימות</h2><div class="jobs" id="jobs"></div></section>
  <section class="panel"><h2>חשוב לדעת</h2><p class="muted">הדף הראשי מציג רק משרות פעילות. כיבוי משרה מוריד אותה משדה הבחירה בדף, בלי לגעת בקוד.</p><p><a href="index.html">חזרה לדף הנחיתה</a></p></section>
</div>
<script>
const SUPABASE_URL='https://yiuastakbcntxbanhvgn.supabase.co';const SUPABASE_KEY='sb_publishable_ZRl5LzsV7HiyCeNolg9Oqw_Fte8UrA7';const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const $=id=>document.getElementById(id);function msg(id,text,type='success'){ $(id).innerHTML=text?`<div class="${type}">${text}</div>`:'' }
async function setMode(){const {data:{session}}=await sb.auth.getSession();const logged=!!session;$('loginPanel').classList.toggle('hidden',logged);$('appPanel').classList.toggle('hidden',!logged);$('listPanel').classList.toggle('hidden',!logged);$('logoutBtn').classList.toggle('hidden',!logged);if(logged) loadJobs();}
$('loginBtn').onclick=async()=>{msg('loginMsg','');const {error}=await sb.auth.signInWithPassword({email:$('email').value.trim(),password:$('password').value});if(error)return msg('loginMsg',error.message,'error');setMode()};$('logoutBtn').onclick=async()=>{await sb.auth.signOut();setMode()};
$('addBtn').onclick=async()=>{const row={title:$('title').value.trim(),location:$('location').value.trim(),sort_order:Number($('sort').value||10),is_active:true};if(!row.title||!row.location)return msg('appMsg','נא למלא שם משרה ומיקום','error');const {error}=await sb.from('jobs').insert(row);if(error)return msg('appMsg',error.message,'error');$('title').value='';$('location').value='';msg('appMsg','המשרה נוספה');loadJobs()};
async function loadJobs(){const {data,error}=await sb.from('jobs').select('*').order('sort_order',{ascending:true});if(error){$('jobs').innerHTML=`<div class="error">${error.message}</div>`;return}$('jobs').innerHTML=(data||[]).map(j=>`<div class="job"><input value="${j.title||''}" data-field="title" data-id="${j.id}"><input value="${j.location||''}" data-field="location" data-id="${j.id}"><input type="number" value="${j.sort_order||0}" data-field="sort_order" data-id="${j.id}"><select data-field="is_active" data-id="${j.id}"><option value="true" ${j.is_active?'selected':''}>פעילה</option><option value="false" ${!j.is_active?'selected':''}>כבויה</option></select><button class="btn black" onclick="saveJob('${j.id}')">שמירה</button></div>`).join('')||'<p class="muted">אין משרות עדיין.</p>'}
async function saveJob(id){const els=[...document.querySelectorAll(`[data-id="${id}"]`)];const row={};els.forEach(el=>{let v=el.value;if(el.dataset.field==='is_active')v=v==='true';if(el.dataset.field==='sort_order')v=Number(v||0);row[el.dataset.field]=v});const {error}=await sb.from('jobs').update(row).eq('id',id);if(error)alert(error.message);else loadJobs()}window.saveJob=saveJob;setMode();
</script></body></html>
